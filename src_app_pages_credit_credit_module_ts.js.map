<!-- 表頭 Start -->
<div class="main-title-container">
  <div class="override-content-container-padding"></div>
  <div class="md:flex">
    <p>信用額度定期更新作業</p>
    <p class="text-danger md:pl-3">(機密資料禁止外流)</p>
  </div>
  <div class="btn-container">
    <button pButton type="button" class="btn-gray" label="收起"></button>
  </div>
</div>

<credit-form-header-template></credit-form-header-template>
<!-- 表頭 End -->

<!-- 表單內容 -->
<credit-form-update-content-template></credit-form-update-content-template>

<credit-form-cust-request-template></credit-form-cust-request-template>

<credit-table-collateral-detail-template></credit-table-collateral-detail-template>

<credit-table-ar-insurance-template></credit-table-ar-insurance-template>

<credit-table-ar-status-template></credit-table-ar-status-template>

<credit-table-credit-status-template></credit-table-credit-status-template>

<credit-table-factoring-template></credit-table-factoring-template>

<!-- 2.附件連結 -->
<app-common-attached-file-log formStatus="apply"></app-common-attached-file-log>

<!-- 意見 -->
<ng-container *ngIf="role === CREDIT_STATUS.APPLY">
  <div class="sub-title-container comment-section" style="margin-top: 30px">
    <p>{{ "LicenseMgmt.Common.Title.Opinion" | translate }}</p>
  </div>
  <form class="form-container form-table">
    <div class="form-row remark grid">
      <div class="form-col col-12">
        <div class="form-row grid">
          <div class="form-col col-fixed">
            <div class="form-label">
              <label class="txt">
                {{ "LicenseMgmt.Common.Label.Opinion" | translate }}
              </label>
            </div>
          </div>
          <div class="grid md:col col-12">
            <div class="form-col form-input col-12">
              <div class="form-input no-h-full">
                <textarea type="text" pInputTextarea name="comment"></textarea>
                <div class="form-hint">
                  <span>
                    {{ "LicenseMgmt.Common.Hint.CurWordCount" | translate }}
                    &nbsp;&nbsp; 0&nbsp;/&nbsp;250
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>
</ng-container>

<!-- 信管評價 -->
<p-table
  class="table-panel"
  [breakpoint]="'640px'"
  [responsive]="true"
  [responsiveLayout]="'stack'"
  [value]="creditManagementEvaluationDataTable.data"
>
  <ng-template pTemplate="header">
    <tr>
      <th
        *ngFor="
          let item of creditManagementEvaluationDataTable.tableCols;
          index as i
        "
        class="text-center"
        [class.w-100]="i === 0"
      >
        {{ item.label }}
        <span *ngIf="i === 0" class="text-danger">
          (集團內部資料,請勿轉給客戶)
        </span>
      </th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-data>
    <tr>
      <td
        *ngFor="
          let col of creditManagementEvaluationDataTable.tableCols;
          index as i
        "
        [class.w-100]="i === 0"
      >
        <span class="p-column-title">
          {{ col.label }}
        </span>
        <p>{{ data[col.field] }}</p>
      </td>
    </tr>
  </ng-template>
</p-table>

<!--# action Section-->
<div *ngIf="role === CREDIT_STATUS.APPLY" class="btn-container">
  <button
    pButton
    type="button"
    label="{{ 'Button.Label.Cancel' | translate }}"
    class="btn-gray"
  ></button>
  <button
    pButton
    type="button"
    class="submit"
    label="{{ 'Button.Label.Submit' | translate }}"
  ></button>
  <button
    pButton
    type="button"
    label="{{ 'Button.Label.Draft' | translate }}"
    class="draft btn-teal"
  ></button>
  <button
    pButton
    type="button"
    class="btn-outline-blue"
    label="{{ 'Button.Label.RedirectApproval' | translate }}"
  ></button>
</div>

<br />

<!-- 3.簽核歷程 （審核/查詢） -->
<ng-container *ngIf="role !== CREDIT_STATUS.APPLY">
  <app-history-log></app-history-log>
</ng-container>
