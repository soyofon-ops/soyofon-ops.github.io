<form class="form-table">
  <div class="form-container form-table">
    <!-- 申請方式 -->
    <div class="form-row grid">
      <div class="form-col col-fixed">
        <div class="form-label">
          <label class="txt">申請方式</label>
        </div>
      </div>
      <div class="form-col col">
        <div class="form-radio">
          <p-radioButton
            [(ngModel)]="applyMethod"
            name="radioGroup"
            label="Apply"
            value="Apply"
          ></p-radioButton>
          <p-radioButton
            [(ngModel)]="applyMethod"
            name="radioGroup"
            label="Cancel"
            value="Cancel"
          ></p-radioButton>
        </div>
      </div>
    </div>
  </div>
</form>

<br />

<ng-container [ngSwitch]="applyMethod">
  <ng-container
    *ngSwitchCase="'Apply'"
    [ngTemplateOutlet]="applyTemplate"
  ></ng-container>
  <ng-container
    *ngSwitchCase="'Cancel'"
    [ngTemplateOutlet]="cancelTemplate"
  ></ng-container>
</ng-container>

<ng-template #applyTemplate>
  <!-- 新增按鈕 -->
  <div
    class="sub-title-container item-section"
    *ngIf="route.snapshot.toString().includes('apply')"
  >
    <div>
      <button
        pButton
        class="add-item"
        icon="pi pi-plus"
        type="button"
        label="{{ 'Button.Label.Add' | translate }} Item"
        (click)="insertPaymentTermsRow()"
      ></button>
    </div>
  </div>

  <p-table
    class="table-panel"
    [breakpoint]="'640px'"
    [responsive]="true"
    [responsiveLayout]="'stack'"
    [scrollable]="true"
    [value]="paymentTermsApplyDataTable.data"
  >
    <ng-template pTemplate="header">
      <tr>
        <th
          *ngFor="let col of paymentTermsApplyDataTable.tableCols"
          class="justify-content-center"
          [ngClass]="col.class"
        >
          {{ col.label }}
        </th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-data let-index="rowIndex">
      <tr class="form-table fit-row">
        <td
          *ngFor="let col of paymentTermsApplyDataTable.tableCols"
          class="form-row p-0"
          [ngClass]="col.class"
          [class.grid]="viewpointWidth < 641"
        >
          <div class="p-column-title form-col col-fixed">
            <div class="form-label flex-container-col">
              <label class="txt">{{ col.label }}</label>
            </div>
          </div>
          <div [ngSwitch]="col.field" class="form-col col-12">
            <div
              *ngSwitchCase="'seq'"
              class="form-label justify-content-center"
            >
              {{ index + 1 }}
            </div>
            <div
              *ngSwitchCase="'appliedPaymentTerms'"
              class="form-input text-center"
            >
              <a href="#">Payment Terms<br />已申請資料</a>
            </div>
            <div *ngSwitchCase="'usageStatus'" class="form-input text-center">
              <a href="#">客戶額度<br />使用狀況</a>
            </div>
            <div *ngSwitchCase="'delete'" class="form-input text-center">
              <button
                pButton
                type="button"
                class="icon-btn btn-dark-red"
                icon="pi pi-trash"
                (click)="removePaymentTermsRow(index)"
              ></button>
            </div>
            <div *ngSwitchDefault class="form-input">
              <input
                [(ngModel)]="data[col.field]"
                type="text"
                pInputText
                [name]="col.field"
              />
            </div>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</ng-template>

<ng-template #cancelTemplate>
  <button
    pButton
    type="button"
    [label]="'Button.Label.Add' | translate"
  ></button>
</ng-template>

<br />
<br />

<p-dialog
  [header]="'Cancel'"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
></p-dialog>
