<div class="sub-title-container form-section">
  <p>Credit Status</p>
</div>

<p-table
  class="table-panel"
  [scrollable]="true"
  [breakpoint]="'640px'"
  [responsive]="true"
  [responsiveLayout]="'stack'"
  [value]="creditStatusDataTable.data"
>
  <ng-template pTemplate="header">
    <tr>
      <th
        *ngFor="let item of creditStatusDataTable.tableCols; index as i"
        class="text-center"
        [ngClass]="item.class"
      >
        {{ item.label }}
      </th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-data>
    <tr>
      <td
        *ngFor="let col of creditStatusDataTable.tableCols; index as i"
        [class.w-100]="i === 0"
      >
        <span class="p-column-title">
          {{ col.label }}
        </span>
        <p>{{ data[col.field] }}</p>
      </td>
    </tr>
  </ng-template>
</p-table>

<br />
