<form class="form-table">
  <div class="form-container form-table">
    <!-- 公司 -->
    <div class="form-row grid">
      <div class="form-col col-fixed">
        <div class="form-label require flex-container-col">
          <label class="txt">公司</label>
        </div>
      </div>
      <div class="grid md:col col-12">
        <div class="form-col form-input col-12">
          <div class="form-input">
            <input
              type="text"
              pInputText
              name="company"
              readonly
              value="世平興業股份有限公司"
            />
          </div>
        </div>
      </div>
    </div>
    <!-- 業務員資訊 -->
    <div class="form-row grid">
      <div class="form-col md:col-4 col-12">
        <!-- 業務員 -->
        <div class="form-row multi-input-kit grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">業務員</label>
            </div>
          </div>
          <div class="grid md:col col-12">
            <div class="form-col col-12">
              <div class="form-input">
                <input
                  type="text"
                  pInputText
                  name="company"
                  readonly
                  value="1111 Chou, Yenyen 周小燕"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="form-col md:col-4 col-12">
        <!-- 業務員部門 -->
        <div class="form-row multi-input-kit grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">業務員部門</label>
            </div>
          </div>
          <div class="grid md:col col-12">
            <div class="form-col col-12">
              <div class="form-input">
                <input
                  type="text"
                  pInputText
                  name="company"
                  readonly
                  value="3PL onsemi營運服務B1組_主管"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- 申請資訊 -->

      <div class="form-col lg:col-4 col-12">

            <div class="form-label require flex-container-col">
              <label class="txt">申請類別</label>

          </div>
          <div class="grid md:col col-12">
            <div class="form-col col-12">
              <div class="form-input">
                <input
                  type="text"
                  pInputText
                  name="company"
                  readonly
                  [placeholder]="'Input.PlaceHolder.PleaseSelect' | translate"

            </div>
          </div>
        </div>
      </div>
      <div class="form-col lg:col-4 col-12">
        <!-- 申請原因 -->
        <div class="form-row multi-input-kit grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">申請原因</label>

            <div class="form-col col-12">
              <div class="form-input">
                <input
                  type="text"
                  pInputText
                  name="company"
                  readonly
                  [placeholder]="'Input.PlaceHolder.PleaseSelect' | translate"

        </div>

                <input type="text" pInputText name="company" readonly />
              </div>

          </div>
        </div>
