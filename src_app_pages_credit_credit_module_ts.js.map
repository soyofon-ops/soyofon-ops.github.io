<!-- 表單內容 -->
<form class="form-table">
  <div class="form-container form-table">
    <!-- 客戶集團總額度 -->
    <div class="form-row grid">
      <div class="form-col lg:col-4 col-12">
        <!-- 客戶集團總額度 -->
        <div class="form-row multi-input-kit grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">客戶集團總額度</label>
            </div>
          </div>
          <div class="grid md:col col-12">
            <div class="form-col flex w-100">
              <div class="form-input flex-1">
                <input
                  type="text"
                  pInputText
                  name="company"
                  readonly
                  value="25,000.00"
                />
              </div>
              <div class="form-label flex-0 nowrap">
                <label class="txt">(USD)</label>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="form-col lg:col-4 col-12">
        <!-- 額度截止有效日期 -->
        <div class="form-row multi-input-kit grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">額度截止有效日期</label>
            </div>
          </div>
          <div class="grid md:col col-12">
            <div class="form-col col-12">
              <div class="form-input">
                <input
                  type="text"
                  pInputText
                  name="company"
                  readonly
                  value="2023/09/09"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="form-col lg:col-4 col-12">
        <!-- 額度截止有效日期管理 -->
        <div class="form-row multi-input-kit grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">額度截止有效日期管理</label>
            </div>
          </div>
          <div class="grid md:col col-12">
            <div class="form-col col-12">
              <div class="form-input">
                <input
                  type="text"
                  pInputText
                  name="company"
                  readonly
                  value=""
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- 核准生效日期 -->
    <div class="form-row grid">
      <div class="form-col lg:col-4 col-12">
        <!-- 核准生效日期 -->
        <div class="form-row multi-input-kit grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">核准生效日期</label>
            </div>
          </div>
          <div class="grid md:col col-12">
            <div class="form-col col-12">
              <div class="form-input">
                <input
                  type="text"
                  pInputText
                  name="company"
                  readonly
                  [placeholder]="'Input.PlaceHolder.PleaseSelect' | translate"
                  value="2023/9/10"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="form-col lg:col-4 col-12">
        <!-- 核准業務員額度 -->
        <div class="form-row multi-input-kit grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">核准業務員額度</label>
            </div>
          </div>
          <div class="grid md:col col-12">
            <div class="form-col flex w-100">
              <div class="form-input flex-1">
                <input
                  type="text"
                  pInputText
                  name="company"
                  readonly
                  [placeholder]="'Input.PlaceHolder.PleaseSelect' | translate"
                  value="10,000.00"
                />
              </div>
              <div class="form-label flex-0 nowrap">
                <label class="txt">(USD)</label>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="form-col lg:col-4 col-12">
        <!-- 預計更新日期 -->
        <div class="form-row multi-input-kit grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">預計更新日期</label>
            </div>
          </div>
          <div class="grid md:col col-12">
            <div class="form-col col-12">
              <div class="form-input">
                <input type="text" pInputText name="company" readonly />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- 目前單一客戶總額度 -->
    <div class="form-row grid">
      <div class="form-col lg:col-4 col-12">
        <!-- 目前單一客戶總額度 -->
        <div class="form-row multi-input-kit grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">目前單一客戶總額度</label>
            </div>
          </div>
          <div class="grid md:col col-12">
            <div class="form-col flex w-100">
              <div class="form-input flex-1">
                <input
                  type="text"
                  pInputText
                  name="company"
                  readonly
                  value="25,000.00"
                />
              </div>
              <div class="form-label flex-0 nowrap">
                <label class="txt">(USD)</label>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="form-col lg:col-4 col-12">
        <!-- 核准單一客戶總額度 -->
        <div class="form-row multi-input-kit grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">核准單一客戶總額度</label>
            </div>
          </div>
          <div class="grid md:col col-12">
            <div class="form-col flex w-100">
              <div class="form-input flex-1">
                <input
                  type="text"
                  pInputText
                  name="company"
                  readonly
                  value="25,000.00"
                />
              </div>
              <div class="form-label flex-0 nowrap">
                <label class="txt">(USD)</label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- 審核狀態 -->
    <div class="form-row grid">
      <div class="form-col lg:col-4 col-12">
        <!-- 審核狀態 -->
        <div class="form-row grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">審核狀態</label>
            </div>
          </div>
          <div class="grid md:col col-12 margin-auto">
            <div class="form-col col-12">
              <div class="form-input">
                <input type="text" pInputText name="company" readonly />
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="form-col lg:col-4 col-12">
        <!-- 審核狀態 -->
        <div class="form-row grid">
          <div class="form-col col-fixed">
            <div class="form-label require flex-container-col">
              <label class="txt">AI 建議額度</label>
            </div>
          </div>
          <div class="grid md:col col-12 margin-auto">
            <div class="form-col col-12">
              <div class="form-input">
                <input type="text" pInputText name="company" readonly />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>

<br />

<p-table
  class="table-panel"
  [breakpoint]="'640px'"
  [responsive]="true"
  [responsiveLayout]="'stack'"
  [value]="custRequestDetailDataTable.data"
>
  <ng-template pTemplate="header">
    <tr>
      <th
        *ngFor="let col of custRequestDetailDataTable.tableCols"
        class="text-center"
      >
        {{ col.label }}
      </th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-data>
    <tr class="form-table">
      <td
        *ngFor="let col of custRequestDetailDataTable.tableCols"
        class="form-row p-0"
        [class.grid]="viewpointWidth < 641"
      >
        <div class="p-column-title form-col col-fixed">
          <div class="form-label require flex-container-col">
            <label class="txt">{{ col.label }}</label>
          </div>
        </div>
        <div class="form-col col-12">
          <div class="form-input">
            <input
              [(ngModel)]="data[col.field]"
              type="text"
              pInputText
              [name]="col.field"
            />
          </div>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>

<br />
