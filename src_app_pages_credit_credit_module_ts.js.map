<div class="sub-title-container form-section">
  <p>客戶產品分類明細維護</p>
</div>

<br />

<!-- 新增按鈕 -->
<div
  class="sub-title-container item-section"
  *ngIf="route.snapshot.toString().includes('apply')"
>
  <div>
    <button
      pButton
      class="add-item"
      icon="pi pi-plus"
      type="button"
      label="{{ 'Button.Label.Add' | translate }} Item"
      (click)="insertCustAppSegmentDetailRow()"
    ></button>
  </div>
</div>

<p-table
  class="table-panel flex-table"
  [breakpoint]="'640px'"
  [responsive]="true"
  [responsiveLayout]="'stack'"
  [value]="custAppSegmentDetailDataTable.data"
>
  <ng-template pTemplate="header">
    <tr>
      <th
        *ngFor="let col of custAppSegmentDetailDataTable.tableCols"
        class="text-center"
        [ngClass]="col.class"
      >
        {{ col.label }}
      </th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-data let-index="rowIndex">
    <tr class="form-table fit-row">
      <td
        *ngFor="let col of custAppSegmentDetailDataTable.tableCols"
        class="form-row p-0"
        [ngClass]="col.class"
        [class.grid]="viewpointWidth < 641"
      >
        <div class="p-column-title form-col col-fixed">
          <div class="form-label flex-container-col">
            <label class="txt">{{ col.label }}</label>
          </div>
        </div>
        <div [ngSwitch]="col.field" class="form-col col-12">
          <div *ngSwitchCase="'seq'" class="form-label justify-content-center">
            {{ index + 1 }}
          </div>
          <div *ngSwitchCase="'primaryFlag'" class="form-input text-center">
            <p-dropdown
              [(ngModel)]="data[col.field]"
              class="w-100"
              [options]="[
                { label: 'Y', value: 'Y' },
                { label: 'N', value: 'N' }
              ]"
            ></p-dropdown>
          </div>
          <div *ngSwitchCase="'active'" class="form-input text-center">
            <p-dropdown
              [(ngModel)]="data[col.field]"
              class="w-100"
              [options]="[
                { label: 'Y', value: 'Y' },
                { label: 'N', value: 'N' }
              ]"
            ></p-dropdown>
          </div>
          <div *ngSwitchCase="'delete'" class="form-input text-center">
            <button
              pButton
              type="button"
              class="icon-btn btn-dark-red"
              icon="pi pi-trash"
              (click)="removeCustAppSegmentDetailRow(index)"
            ></button>
          </div>
          <div *ngSwitchDefault class="form-input">
            <input
              [(ngModel)]="data[col.field]"
              type="text"
              pInputText
              [name]="col.field"
            />
          </div>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>

<br />
